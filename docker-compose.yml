services:
  db:
    image: postgres:16-alpine
    container_name: fromistargram_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fromistargram_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_ROOT: /data
    volumes:
      - ./data:/data
    ports:
      - '${API_PORT:-4000}:4000'
    command: ['node', 'dist/server.js']

  thumb:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: fromistargram_thumb
    env_file:
      - .env
    environment:
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /data
      IMGPROXY_BIND: ':8080'
      IMGPROXY_PATH_PREFIX: /thumb
    volumes:
      - ./data:/data:ro
    ports:
      - '${THUMBNAIL_PORT:-8080}:8080'

volumes:
  pg_data:
