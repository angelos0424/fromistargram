services:
  db:
    image: postgres:16-alpine
    container_name: fromistargram_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fromistargram_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATA_ROOT: /data
      REDIS_URL: redis://redis:6379
    volumes:
      - /mnt/volume1/fromistargram:/data
    ports:
      - '${API_PORT:-4000}:4000'
    command: ['node', 'dist/server.js']

  thumb:
    image: ghcr.io/imgproxy/imgproxy:latest
    container_name: fromistargram_thumb
    env_file:
      - .env
    environment:
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /data
      IMGPROXY_BIND: ':8080'
      IMGPROXY_PATH_PREFIX: '/thumb'
      IMGPROXY_ENABLE_VIDEO_THUMBNAILS: 'true'
      IMGPROXY_TTL: '2628000' # 1month
      IMGPROXY_USE_ETAG: 'true'
    volumes:
      - /mnt/volume1/fromistargram:/data:ro

  nginx-cache:
    image: nginx:alpine
    container_name: fromistargram_cache
    depends_on:
      - thumb
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/volume1/fromistargram/nginx_cache:/var/cache/nginx
    ports:
      - '${THUMBNAIL_PORT:-8080}:80'

  redis:
    image: redis:alpine
    container_name: fromistargram_redis
    volumes:
      - /mnt/volume1/fromistargram/redis:/data

volumes:
  pg_data:
